# Example HomeOps infra configuration.
#
# This file lives at the root of your PRIVATE infra repo, next to an `env/`
# directory holding the per-app env files referenced below. It is the single
# source of truth for the server.

server:
  name: vps-01

admin:
  # Keep the admin UI on localhost and reach it through the proxy's admin_domain,
  # or expose it directly and protect it with a token.
  bind: "127.0.0.1:9090"
  username: admin
  password: "change-me"          # plaintext is accepted; the repo is private
  # auth_token: "a-long-random-token"   # alternative to username/password

reconcile:
  interval: "2m"

proxy:
  mode: homeops
  listen: "0.0.0.0:80"
  admin_domain: "ops.example.com"

backups:
  target:
    type: local
    path: "/var/lib/homeops/backups"
  retention: 7
  compression: gzip

databases:
  postgres:
    enabled: true
    version: "16"
    admin_user: admin
    admin_password: "postgres-password"

  mysql:
    enabled: false
    version: "8"
    admin_user: admin
    admin_password: "mysql-password"

# Optional Caddy integration. Default is off so HomeOps never takes over the box.
caddy:
  mode: off
  # mode: fragment
  # output: /etc/caddy/homeops.caddy

apps:
  site:
    repo: git@github.com:you/site.git
    ref: main
    domains:
      - example.com
      - www.example.com
    port: 3000
    env_file: env/site.env

  api:
    repo: git@github.com:you/api.git
    ref: main
    domains:
      - api.example.com
    port: 3000
    env_file: env/api.env
    databases:
      postgres:
        database: api
        env_var: DATABASE_URL
    healthcheck:
      path: /health
      timeout_seconds: 10
      interval_seconds: 5
      retries: 5
